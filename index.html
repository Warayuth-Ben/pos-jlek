<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#101316">
  <title>ร้านเจ๊เล็กข้าวมันไก่ POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="pos-shell">
    <section class="menu-panel" aria-labelledby="menu-title">
      <header class="panel-header">
        <div>
          <p class="eyebrow">หน้าร้าน</p>
          <h1 id="menu-title">เมนูอาหาร</h1>
        </div>
        <div class="clock" id="clock" aria-label="เวลาปัจจุบัน">--:--</div>
      </header>

      <div class="menu-grid" id="menu-grid" aria-live="polite"></div>
    </section>

    <section class="center-panel">
      <section class="queue-section" aria-labelledby="queue-title">
        <div class="queue-heading">
          <div>
            <p class="eyebrow">📋 บิลที่กำลังดำเนินการ</p>
            <h2 id="queue-title">คิว bills</h2>
          </div>
        </div>
        <div class="queue-list" id="queue-list"></div>
      </section>

      <section class="bill-section" aria-labelledby="bill-title">
        <div class="bill-heading">
          <h2 id="bill-title">ยังไม่ได้เลือกโต๊ะ</h2>
          <span class="item-count" id="item-count">0 รายการ</span>
        </div>

        <div class="empty-state" id="empty-state">
          <div class="empty-icon">⌁</div>
          <strong>เลือกโต๊ะเพื่อเริ่มรับออเดอร์</strong>
          <p>จากนั้นแตะราคาที่เมนูด้านซ้าย</p>
        </div>

        <div class="bill-list" id="bill-list" hidden></div>

        <div class="bill-footer">
          <button class="action history" id="history-button" type="button" hidden>📋 ประวัติ</button>
          <div class="total-row">
            <span>ยอดรวม</span>
            <strong><span id="total">0</span> <small>บาท</small></strong>
          </div>
        </div>
      </section>
    </section>

    <aside class="right-panel">
      <section class="table-section-compact" aria-labelledby="table-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">โต๊ะ</p>
          </div>
          <button class="icon-button" id="legend-button" aria-label="ดูคำอธิบายสถานะ" type="button">?</button>
        </div>
        <div class="table-grid" id="table-grid"></div>
        <div class="takeaway-section">
          <div class="takeaway-header">
            <div class="takeaway-header-left">
              <p class="eyebrow">กลับบ้าน</p>
              <span class="takeaway-badge" id="takeaway-count">0</span>
            </div>
            <button class="takeaway-new-btn" id="new-takeaway-button" type="button">＋ ใหม่</button>
          </div>
          <div class="takeaway-grid" id="takeaway-grid"></div>
        </div>
      </section>

      <section class="actions-section">
        <div class="actions-group">
          <button class="action primary" id="add-button" type="button">＋ เพิ่มรายการ</button>
          <button class="action water" id="water-button" type="button">💧 น้ำ +1</button>
        </div>
        <div class="actions-group">
          <button class="action confirm" id="confirm-order-button" type="button">
            ✅ ยืนยันออเดอร์
          </button>
          <button class="action edit" id="confirm-edit-button" type="button" hidden>
            ✅ ยืนยันการแก้ไข
          </button>
        </div>
        <div class="actions-group">
          <button class="action eating" id="eating-button" type="button" hidden>🍽️ กำลังกิน</button>
          <button class="action payment" id="payment-button" type="button" hidden>💳 รอชำระเงิน</button>
        </div>
        <div class="actions-group">
          <button class="action pay" id="pay-button" type="button">💰 คิดเงิน</button>
          <button class="action cancel" id="cancel-button" type="button">❌ ยกเลิก</button>
        </div>
      </section>
    </aside>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="modal-backdrop" id="confirm-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-icon" id="modal-icon">✓</div>
      <h2 id="modal-title">คิดเงิน</h2>
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button class="action secondary" id="modal-close" type="button">กลับ</button>
        <button class="action pay" id="modal-confirm" type="button">ยืนยัน</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="note-modal" hidden>
    <div class="modal note-modal" role="dialog" aria-modal="true" aria-labelledby="note-modal-title">
      <h2 id="note-modal-title">แก้ไขหมายเหตุ</h2>
      <div class="note-item-name" id="note-item-name"></div>
      <div class="quick-options" id="quick-options">
        <button class="quick-option" type="button" data-note="ไม่เอาหนัง">ไม่เอาหนัง</button>
        <button class="quick-option" type="button" data-note="เอาหนัง">เอาหนัง</button>
        <button class="quick-option" type="button" data-note="ไม่เอาแตง">ไม่เอาแตง</button>
        <button class="quick-option" type="button" data-note="ไม่ราดน้ำ">ไม่ราดน้ำ</button>
        <button class="quick-option" type="button" data-note="ไม่เอาเครื่องใน">ไม่เอาเครื่องใน</button>
      </div>
      <textarea id="note-text" rows="3" placeholder="หมายเหตุเพิ่มเติม..."></textarea>
      <div class="modal-actions">
        <button class="action secondary" id="note-cancel" type="button">ยกเลิก</button>
        <button class="action confirm" id="note-save" type="button">บันทึก</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="history-modal" hidden>
    <div class="modal history-modal" role="dialog" aria-modal="true" aria-labelledby="history-modal-title">
      <div class="history-header">
        <h2 id="history-modal-title">📋 ประวัติการดำเนินการ</h2>
        <button class="icon-button close-history" id="close-history" type="button">✕</button>
      </div>
      <div class="history-filter" id="history-filter">
        <button class="filter-button active" data-filter="all" type="button">ทั้งหมด</button>
        <button class="filter-button" data-filter="1" type="button">ออเดอร์ #01</button>
        <button class="filter-button" data-filter="2" type="button">ออเดอร์ #02</button>
        <button class="filter-button" data-filter="3" type="button">ออเดอร์ #03</button>
      </div>
      <div class="history-content" id="history-content"></div>
    </div>
  </div>

  <script src="changelog.js"></script>
  <script src="app.js"></script>
</body>
</html>
